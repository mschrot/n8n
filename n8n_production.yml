version: "3.8"

services:
  # ------------------------
  # n8n (Automation / Workflow Engine)
  # ------------------------
  # → Low-Code Tool für Automationen (ähnlich Zapier)
  # → Kann APIs verbinden, AI Workflows bauen, Cronjobs ausführen
  # → Nutzt PostgreSQL statt SQLite für bessere Performance
  # → Kann mit Redis skalieren (Queue Mode)
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678" # Webinterface erreichbar über Port 5678
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://DEINEIP:5678/ # ⚠️ Auf deine öffentliche IP ändern
      - GENERIC_TIMEZONE=Europe/Berlin

      # PostgreSQL Datenbank (empfohlen für Stabilität)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=dein_passwort # ⚠️ ändern!

      # Redis Queue (für Skalierung / parallele Jobs)
      - QUEUE_BULL_REDIS_HOST=redis

    volumes:
      - n8n_data:/home/node/.n8n # Persistente Workflows & Credentials

    depends_on:
      - postgres
      - redis

    # Traefik Routing (für Domains wie n8n.local)
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.local`)"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

    restart: always

  # ------------------------
  # PostgreSQL (Hauptdatenbank)
  # ------------------------
  # → Speichert n8n Workflows, Logs und Credentials
  # → Deutlich stabiler als SQLite bei vielen Workflows
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=dein_passwort # ⚠️ ändern!
      - POSTGRES_DB=n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistente DB Daten
    restart: always

  # ------------------------
  # Redis (Cache / Queue System)
  # ------------------------
  # → Wird von n8n für Queue Mode genutzt
  # → Ermöglicht parallele Worker & bessere Performance
  redis:
    image: redis:7
    container_name: redis
    restart: always

  # ------------------------
  # Ollama (Lokale LLM Engine)
  # ------------------------
  # → Führt lokale AI Modelle aus (z.B. llama3, mistral)
  # → Kein OpenAI nötig → alles lokal!
  # → API erreichbar unter Port 11434
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434" # API für AI Modelle
    volumes:
      - ollama_data:/root/.ollama # Modelle werden hier gespeichert
    restart: always

  # ------------------------
  # Open WebUI (Chat Interface für AI)
  # ------------------------
  # → Web UI ähnlich ChatGPT
  # → Nutzt Ollama als Backend
  # → Perfekt für Tests & lokale Nutzung
  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: openwebui
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - openwebui_data:/app/backend/data # Chat History etc.

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai.rule=Host(`ai.local`)"
      - "traefik.http.services.ai.loadbalancer.server.port=8080"

    restart: always

  # ------------------------
  # Qdrant (Vector Database)
  # ------------------------
  # → Speichert Embeddings für AI (Memory / RAG)
  # → Wird genutzt für:
  #    - Chatbot Memory
  #    - Dokumentensuche
  #    - Semantic Search
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333" # API + Web Dashboard
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  # ------------------------
  # MinIO (S3 Object Storage)
  # ------------------------
  # → Alternative zu AWS S3 (self-hosted)
  # → Speichert Dateien:
  #    - Uploads
  #    - PDFs
  #    - AI Outputs
  # → Kompatibel mit S3 APIs
  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=dein_passwort # ⚠️ ändern!
    ports:
      - "9100:9000" # S3 API
      - "9001:9001" # Web UI
    volumes:
      - minio_data:/data
    restart: always

  # ------------------------
  # Traefik (Reverse Proxy / Routing)
  # ------------------------
  # → Leitet Domains auf Container weiter
  # → Ermöglicht:
  #    - n8n.local
  #    - ai.local
  # → Kann später HTTPS (Let's Encrypt)
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - "--api.insecure=true" # Dashboard aktiv
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"

    ports:
      - "80:80"       # HTTP
      - "8080:8080"   # Traefik Dashboard

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    restart: always

# ------------------------
# Volumes (Persistente Daten)
# ------------------------
# → Verhindert Datenverlust bei Container Neustart
volumes:
  n8n_data:
  postgres_data:
  redis_data:
  ollama_data:
  qdrant_data:
  minio_data:
  openwebui_data:


